# Author info shown on the نویسندگان (authors) page.
# Keyed by the Persian author name exactly as it appears in post tags.
# Fields: name, country, born, died (omit if living), works, bio.
# Years use Persian (Gregorian) numerals. Entries without an exact birth
# year omit `born` rather than guess.

- name: آتوسا مشفق
  country: آمریکا
  born: "۱۹۸۱"
  works: "سال استراحت و آرامش من، آیلین، مرگ به دستان او"
  bio: "نویسنده آمریکایی با تباری ایرانی–کروات که با نثری سرد، گزنده و سیاه به سراغ شخصیت‌های منزوی و ازخودبیگانه می‌رود. رمان «سال استراحت و آرامش من» او را به یکی از صداهای شاخص ادبیات معاصر آمریکا بدل کرد."

- name: آدولفو بیوئی کاسارس
  country: آرژانتین
  born: "۱۹۱۴"
  died: "۱۹۹۹"
  works: "اختراع مورل، نقشهٔ فرار"
  bio: "نویسنده آرژانتینی و دوست و همکار نزدیک بورخس. شاهکار کوتاه او «اختراع مورل» از سرچشمه‌های ادبیات فانتزی و علمی‌–تخیلی آمریکای لاتین به شمار می‌رود."

- name: آلیس مونرو
  country: کانادا
  born: "۱۹۳۱"
  died: "۲۰۲۴"
  works: "فرار، زندگی عزیز، عشق زن خوب"
  bio: "داستان‌کوتاه‌نویس کانادایی و برنده نوبل ۲۰۱۳ که او را «چخوفِ کانادا» می‌خوانند. مونرو در زندگی زنان شهرهای کوچک اونتاریو، عمقی شگفت و لحظه‌های سرنوشت‌ساز را کشف می‌کند."

- name: آن تایلر
  country: آمریکا
  born: "۱۹۴۱"
  works: "نفس عمیق، شام در رستوران دلتنگی، سیم‌کشی زمین"
  bio: "رمان‌نویس آمریکایی و برنده پولیتزر که جهان داستانی‌اش بیشتر در بالتیمور می‌گذرد. تایلر استاد روایت زندگی خانواده‌های معمولی با مهر، طنز ملایم و دقتی روان‌شناختی است."

- name: آن پچت
  country: آمریکا
  born: "۱۹۶۳"
  works: "بل کانتو، خانه هلندی، شگفتی‌ها"
  bio: "رمان‌نویس آمریکایی که با «بل کانتو» شهرت جهانی یافت. آثار او اغلب درباره خانواده، دلبستگی و پیوندهای ناگهانی میان غریبه‌هاست."

- name: آنتون چخوف
  country: روسیه
  born: "۱۸۶۰"
  died: "۱۹۰۴"
  works: "باغ آلبالو، اتاق شماره ۶، مرغ دریایی، بانو با سگ ملوس"
  bio: "پزشک، داستان‌نویس و نمایشنامه‌نویس روس و یکی از بزرگ‌ترین داستان‌کوتاه‌نویسان تاریخ. چخوف با حذف گره‌گشایی‌های پرطمطراق و تکیه بر لحظه‌های ساده زندگی، شکل مدرن داستان کوتاه را بنیان نهاد."

- name: آنتونیو دی بندتو
  country: آرژانتین
  born: "۱۹۲۲"
  died: "۱۹۸۶"
  works: "زاما، خاموشان، حشره‌شناس"
  bio: "روزنامه‌نگار و نویسنده آرژانتینی که در دوران دیکتاتوری نظامی زندانی و شکنجه شد. رمان «زاما»ی او، روایت انتظار و فروپاشی یک کارمند استعماری، اکنون از کلاسیک‌های ادبیات آمریکای لاتین است."

- name: آنجلا کارتر
  country: انگلیس
  born: "۱۹۴۰"
  died: "۱۹۹۲"
  works: "اتاق خون‌آلود، شب‌های سیرک، قهرمانان و اوباش"
  bio: "نویسنده انگلیسی و چهره شاخص رئالیسم جادویی و فمینیسم گوتیک. کارتر در «اتاق خون‌آلود» قصه‌های پریان آشنا را وارونه و خون‌آلود بازنویسی کرد."

- name: آنی ارنو
  country: فرانسه
  born: "۱۹۴۰"
  works: "سال‌ها، جایگاه، خاطرات یک دختر"
  bio: "نویسنده فرانسوی و برنده نوبل ۲۰۲۲. ارنو با آمیختن خاطره شخصی و تاریخ جمعی، نوعی «خودزندگی‌نامه غیرشخصی» آفرید که در آن طبقه، جنسیت و حافظه کانون توجه‌اند."

- name: آیلین چانگ
  country: چین
  born: "۱۹۲۰"
  died: "۱۹۹۵"
  works: "عشق در شهری ویران، شهوت و احتیاط، نیمه‌سوخته"
  bio: "نویسنده چینی که شیفتگی و سرخوردگی عشق را در شانگهای و هنگ‌کنگِ دهه‌های میانه قرن بیستم تصویر کرد. نثر ظریف و بدبینانه او تأثیری ماندگار بر ادبیات چینی‌زبان گذاشت."

- name: ادوارد مورگان فورستر
  country: انگلیس
  born: "۱۸۷۹"
  died: "۱۹۷۰"
  works: "گذری به هند، اتاقی با منظره، هواردز اند"
  bio: "رمان‌نویس انگلیسی که شکاف طبقاتی، قراردادهای اجتماعی و ناتوانی انسان‌ها در پیوند با یکدیگر را کاوید. شعار مشهور او «فقط پیوند بزن» چکیده جهان‌بینی اوست."

- name: ارنست همینگوی
  country: آمریکا
  born: "۱۸۹۹"
  died: "۱۹۶۱"
  works: "پیرمرد و دریا، وداع با اسلحه، زنگ‌ها برای که به صدا درمی‌آیند"
  bio: "نویسنده آمریکایی و برنده نوبل ۱۹۵۴ که سبک کم‌گو و موجزش («نظریه کوه یخ») نثر داستانی قرن بیستم را دگرگون کرد. تجربه‌های جنگ، شکار و دریا درون‌مایه‌های همیشگی او بودند."

- name: ارنستو ساباتو
  country: آرژانتین
  born: "۱۹۱۱"
  died: "۲۰۱۱"
  works: "تونل، درباره قهرمانان و گورها، فرشته ظلمت"
  bio: "فیزیک‌دان و نویسنده آرژانتینی که علم را رها کرد و به ادبیات روی آورد. رمان کوتاه «تونل»، روایت اول‌شخصِ یک نقاشِ وسواسی و قاتل، از آثار کلیدی اگزیستانسیالیسم آمریکای لاتین است."

- name: اریک امانوئل اشمیت
  country: فرانسه
  born: "۱۹۶۰"
  works: "اسکار و بانوی صورتی‌پوش، موسیو ابراهیم و گل‌های قرآن، انجیل به روایت پیلاطس"
  bio: "نویسنده و نمایشنامه‌نویس فرانسوی–بلژیکی که در آثار کوتاه و پرفروشش به پرسش‌های ایمان، مرگ و معنا با لحنی ساده و انسانی می‌پردازد."

- name: استاندال
  country: فرانسه
  born: "۱۷۸۳"
  died: "۱۸۴۲"
  works: "سرخ و سیاه، صومعه پارم، آرمانس"
  bio: "نام مستعار ماری-هانری بیل، نویسنده فرانسوی و از پیشگامان رئالیسم روان‌شناختی. «سرخ و سیاه» او پرتره‌ای تیزبینانه از جاه‌طلبی و ریا در فرانسه پس از ناپلئون است."

- name: استانیسواو لم
  country: لهستان
  born: "۱۹۲۱"
  died: "۲۰۰۶"
  works: "سولاریس، آدم مصنوعی، شکست‌ناپذیر"
  bio: "نویسنده لهستانی و یکی از بزرگ‌ترین چهره‌های ادبیات علمی‌–تخیلی جهان. لم در «سولاریس» به ناممکن‌بودن ارتباط انسان با هوش بیگانه می‌پردازد؛ پرسشی فلسفی که فراتر از ژانر می‌رود."

- name: استفان هاوکینگ
  country: انگلیس
  born: "۱۹۴۲"
  died: "۲۰۱۸"
  works: "تاریخچه زمان، جهان در پوست گردو، پاسخ‌های کوتاه به پرسش‌های بزرگ"
  bio: "فیزیک‌دان نظری انگلیسی و یکی از مشهورترین دانشمندان معاصر. هاوکینگ با وجود بیماری ای‌ال‌اس، در کیهان‌شناسی و فیزیک سیاه‌چاله‌ها انقلاب کرد و علم را به زبان همگانی درآورد."

- name: استیو تولتز
  country: استرالیا
  born: "۱۹۷۲"
  works: "جزء از کل، ریگ روان"
  bio: "نویسنده استرالیایی که نخستین رمانش، «جزء از کل»، به فهرست نهایی بوکر راه یافت. آثار او آمیزه‌ای پرشتاب از فلسفه، طنز سیاه و داستان‌سراییِ افسارگسیخته‌اند."

- name: اسکار وایلد
  country: ایرلند
  born: "۱۸۵۴"
  died: "۱۹۰۰"
  works: "تصویر دوریان گری، اهمیت ارنست‌بودن، بادبزن لیدی ویندرمیر"
  bio: "نویسنده و نمایشنامه‌نویس ایرلندی و چهره برجسته جنبش زیبایی‌گرایی. وایلد با هوشمندی، طنز و جملات قصارِ درخشانش شناخته می‌شود؛ شهرتش با محاکمه و زندانش به فاجعه‌ای شخصی انجامید."

- name: الکساندر پوشکین
  country: روسیه
  born: "۱۷۹۹"
  died: "۱۸۳۷"
  works: "یوگنی آنگین، دختر سروان، داستان‌های بلکین"
  bio: "شاعر و نویسنده روس که او را بنیان‌گذار ادبیات نوین روسیه می‌دانند. پوشکین در جوانی و در پی یک دوئل کشته شد، اما زبان و قالب‌هایی که آفرید الهام‌بخش همه نویسندگان بزرگ پس از او شد."

- name: الیف شافاک
  country: ترکیه
  born: "۱۹۷۱"
  works: "ملت عشق، ناپاک‌زاده استانبول، ۱۰ دقیقه و ۳۸ ثانیه در این دنیای عجیب"
  bio: "نویسنده ترک و یکی از پرخواننده‌ترین نویسندگان زن جهان. شافاک در آثارش به هویت، تصوف، حقوق زنان و تنش میان شرق و غرب می‌پردازد و به دو زبان ترکی و انگلیسی می‌نویسد."

- name: امیلی برونته
  country: انگلیس
  born: "۱۸۱۸"
  died: "۱۸۴۸"
  works: "بلندی‌های بادگیر"
  bio: "شاعر و رمان‌نویس انگلیسی و یکی از سه خواهر برونته. تنها رمان او، «بلندی‌های بادگیر»، با عشق ویرانگر و خشونت رمانتیکش در زمان انتشار جنجالی بود و امروز از قله‌های ادبیات انگلیسی است."

- name: انوره دو بالزاک
  country: فرانسه
  born: "۱۷۹۹"
  died: "۱۸۵۰"
  works: "بابا گوریو، اوژنی گرانده، زنبق دره"
  bio: "نویسنده فرانسوی و از بنیان‌گذاران رئالیسم. بالزاک در مجموعه عظیم «کمدی انسانی» کوشید تمام لایه‌های جامعه فرانسه را در ده‌ها رمان به هم پیوسته ترسیم کند."

- name: اومبرتو اکو
  country: ایتالیا
  born: "۱۹۳۲"
  died: "۲۰۱۶"
  works: "نام گل سرخ، آونگ فوکو، بائودولینو"
  bio: "نشانه‌شناس، فیلسوف و رمان‌نویس ایتالیایی. اکو در «نام گل سرخ» معمای پلیسی، تاریخ قرون وسطا و فلسفه را در هم آمیخت و نشان داد رمان روشنفکرانه می‌تواند پرفروش هم باشد."

- name: ایان مک‌یوان
  country: انگلیس
  born: "۱۹۴۸"
  works: "تاوان، در ساحل چزیل، آمستردام"
  bio: "رمان‌نویس انگلیسی و از شاخص‌ترین نویسندگان معاصر بریتانیا. مک‌یوان با نثری دقیق و کنترل‌شده، لحظه‌های کوچک اما سرنوشت‌سازی را می‌کاود که زندگی شخصیت‌ها را زیرورو می‌کنند."

- name: ایتالو کالوینو
  country: ایتالیا
  born: "۱۹۲۳"
  died: "۱۹۸۵"
  works: "بارون درخت‌نشین، اگر شبی از شب‌های زمستان مسافری، شهرهای نامرئی"
  bio: "نویسنده ایتالیایی و یکی از خلاق‌ترین چهره‌های ادبیات قرن بیستم. کالوینو از افسانه و فانتزی تا فراداستان پست‌مدرن را آزمود و همواره بازی، تخیل و ساختار را در کانون کارش گذاشت."

- name: ایزابل آلنده
  country: شیلی
  born: "۱۹۴۲"
  works: "خانه ارواح، پائولا، عشق و سایه"
  bio: "نویسنده شیلیایی و یکی از پرخواننده‌ترین نویسندگان اسپانیایی‌زبان. آلنده در سنت رئالیسم جادویی می‌نویسد و سرنوشت زنان، تاریخ پرتلاطم آمریکای لاتین و تبعید را روایت می‌کند."

- name: ایزاک آسیموف
  country: آمریکا
  born: "۱۹۲۰"
  died: "۱۹۹۲"
  works: "بنیاد، من، ربات، فولاد عریان"
  bio: "نویسنده آمریکاییِ روس‌تبار و از غول‌های ادبیات علمی‌–تخیلی. آسیموف «سه قانون رباتیک» را وضع کرد و در مجموعه «بنیاد» سقوط و خیزش یک کهکشان را در گستره هزاران سال تصویر کرد."

- name: ایزاک بشویس سینگر
  country: لهستان
  born: "۱۹۰۲"
  died: "۱۹۹۱"
  works: "شوشا، دشمنان: یک داستان عاشقانه، گیمپل ساده‌دل"
  bio: "نویسنده لهستانی–آمریکایی که به زبان ییدیش می‌نوشت و در ۱۹۷۸ نوبل گرفت. آثار او جهان ازدست‌رفته یهودیان لهستان، ایمان، تردید و شور زندگی را زنده نگه می‌دارند."

- name: براک کلارک
  country: آمریکا
  born: "۱۹۶۸"
  works: "راهنمای آتش‌زدن خانه نویسندگان در نیوانگلند"
  bio: "نویسنده آمریکایی که با رمان طنزآمیز و فراداستانی «راهنمای آتش‌زدن خانه نویسندگان در نیوانگلند» شناخته شد؛ هجوی بر فرهنگ ادبی و میراث نویسندگان کلاسیک."

- name: بیژن نجدی
  country: ایران
  born: "۱۹۴۱"
  died: "۱۹۹۷"
  works: "یوزپلنگانی که با من دویده‌اند، دوباره از همان خیابان‌ها"
  bio: "شاعر و داستان‌نویس ایرانی که تنها یک مجموعه داستان در زمان حیاتش منتشر کرد، اما همان «یوزپلنگانی که با من دویده‌اند» با زبان شاعرانه و تصویری‌اش جایگاهی ویژه در ادبیات معاصر فارسی یافت."

- name: تام رابینز
  country: آمریکا
  born: "۱۹۳۲"
  died: "۲۰۲۵"
  works: "عطر سنبل (عطرِ رؤیا)، حتی گاوچران‌ها هم غمگین می‌شوند، شاهکار"
  bio: "نویسنده آمریکایی و از چهره‌های فرهنگ ضدّجریان دهه شصت و هفتاد. نثر سرشار از بازی، استعاره‌های عجیب و شوخ‌طبعی فلسفی رابینز، او را به نویسنده‌ای کالت بدل کرد."

- name: تامس هاردی
  country: انگلیس
  born: "۱۸۴۰"
  died: "۱۹۲۸"
  works: "تس، دور از مردم شوریده، جود گمنام، بازگشت بومی"
  bio: "رمان‌نویس و شاعر انگلیسی که داستان‌هایش را در منطقه خیالی «وسکس» می‌گذاشت. هاردی با نگاهی تلخ به تقدیر، جبر اجتماعی و سختگیری اخلاقی عصر ویکتوریا، سرنوشت قهرمانانش را رقم می‌زند."

- name: تد چیانگ
  country: آمریکا
  born: "۱۹۶۷"
  works: "داستان زندگی تو، دمیدن، تاجر و دروازه کیمیاگر"
  bio: "نویسنده آمریکاییِ علمی‌–تخیلی که تنها داستان‌های کوتاه می‌نویسد اما هر کدام جایزه‌ای می‌برند. چیانگ ایده‌های علمی و فلسفی دقیق را به پرسش‌هایی ژرف درباره زبان، زمان و آزادی اراده بدل می‌کند."

- name: تری پرچت
  country: انگلیس
  born: "۱۹۴۸"
  died: "۲۰۱۵"
  works: "مجموعه دیسک‌ورلد، بشارت خوب، رنگ جادو"
  bio: "نویسنده انگلیسی و خالق مجموعه پرفروش فانتزیِ طنزآمیز «دیسک‌ورلد». پرچت زیر پوشش کمدی و دنیای خیالی، نقدی تیزبینانه بر سیاست، دین و طبیعت انسان ارائه می‌داد."

- name: تنسی ویلیامز
  country: آمریکا
  born: "۱۹۱۱"
  died: "۱۹۸۳"
  works: "اتوبوسی به نام هوس، باغ‌وحش شیشه‌ای، گربه روی شیروانی داغ"
  bio: "نمایشنامه‌نویس آمریکایی و یکی از بزرگ‌ترین چهره‌های تئاتر قرن بیستم. ویلیامز در نمایشنامه‌هایش شخصیت‌های شکننده و سرخورده جنوب آمریکا را با شعر و شفقت به صحنه آورد."

- name: جان استاین‌بک
  country: آمریکا
  born: "۱۹۰۲"
  died: "۱۹۶۸"
  works: "خوشه‌های خشم، موش‌ها و آدم‌ها، شرق بهشت"
  bio: "نویسنده آمریکایی و برنده نوبل ۱۹۶۲. استاین‌بک با همدلی عمیق، رنج کارگران و کشاورزان آمریکا در دوران رکود بزرگ را روایت کرد و وجدان اجتماعی ادبیات کشورش شد."

- name: جان بارث
  country: آمریکا
  born: "۱۹۳۰"
  died: "۲۰۲۴"
  works: "گمشده در شهربازی، دلال خواب‌ها، اوپرای شناور"
  bio: "نویسنده آمریکایی و از پیشگامان ادبیات پست‌مدرن و فراداستان. بارث در «گمشده در شهربازی» مرز میان داستان و تأمل درباره خودِ داستان را برداشت."

- name: جان فانته
  country: آمریکا
  born: "۱۹۰۹"
  died: "۱۹۸۳"
  works: "از غبار بپرس، جاده لس‌آنجلس، تا بهار صبر کن، باندینی"
  bio: "نویسنده آمریکاییِ ایتالیایی‌تبار که سال‌ها گمنام ماند و سپس با ستایش بوکوفسکی دوباره کشف شد. شخصیت آرتورو باندینی، نویسنده جوان و گرسنه لس‌آنجلس، الگوی نسلی از نویسندگان شد."

- name: جان موریل
  country: آمریکا
  works: "طنز و فلسفه، خنده‌درمانی: فلسفه‌ای جامع درباره طنز"
  bio: "فیلسوف آمریکایی و از سرشناس‌ترین پژوهشگران «فلسفه طنز». موریل می‌کوشد سرشت خنده، شوخی و کمدی را در سنت فلسفه تحلیلی توضیح دهد."

- name: جاناتان فرانزن
  country: آمریکا
  born: "۱۹۵۹"
  works: "اصلاحات، آزادی، پاکیزگی، تقاطع‌ها"
  bio: "رمان‌نویس آمریکایی و از چهره‌های اصلی «رمان اجتماعی بزرگ» معاصر. فرانزن در آثار حجیمش فروپاشی و کشمکش‌های خانواده‌های آمریکایی را در بستر تحولات فرهنگی و سیاسی می‌کاود."

- name: جروم دیوید سَلینجر
  country: آمریکا
  born: "۱۹۱۹"
  died: "۲۰۱۰"
  works: "ناتور دشت، فرنی و زویی، نه داستان"
  bio: "نویسنده آمریکایی که با «ناتور دشت» و قهرمان نوجوان عصیانگرش، هولدن کالفیلد، به نمادی فرهنگی بدل شد. سلینجر سال‌های پایانی عمر را در انزوای کامل و دور از رسانه‌ها گذراند."

- name: جورج الیوت
  country: انگلیس
  born: "۱۸۱۹"
  died: "۱۸۸۰"
  works: "میدل‌مارچ، آسیاب کنار رود فلاس، سایلاس مارنر"
  bio: "نام مستعار مری آن اونز، رمان‌نویس انگلیسی که برای جدی‌گرفته‌شدن نامی مردانه برگزید. «میدل‌مارچ» او را بسیاری بزرگ‌ترین رمان به زبان انگلیسی می‌دانند."

- name: جولیان بارنز
  country: انگلیس
  born: "۱۹۴۶"
  works: "درک یک پایان، طوطی فلوبر، هیاهوی زمان"
  bio: "رمان‌نویس انگلیسی و برنده بوکر. بارنز با نثری ظریف و تأمل‌برانگیز به حافظه، زمان، عشق و خودفریبی می‌پردازد؛ «درک یک پایان» چکیده درخشان این درون‌مایه‌هاست."

- name: جی. ام. کوتزه
  country: آفریقای جنوبی
  born: "۱۹۴۰"
  works: "ننگ، در انتظار بربرها، زندگی و زمانه مایکل ک"
  bio: "نویسنده اهل آفریقای جنوبی و برنده نوبل ۲۰۰۳. کوتزه با نثری سرد و موجز، خشونت، قدرت و تبعات استعمار و آپارتاید را در آثاری اخلاقاً پیچیده کاوید."

- name: جیمز جویس
  country: ایرلند
  born: "۱۸۸۲"
  died: "۱۹۴۱"
  works: "اولیس، دوبلینی‌ها، چهره مرد هنرمند در جوانی"
  bio: "نویسنده ایرلندی و یکی از انقلابی‌ترین چهره‌های مدرنیسم ادبی. جویس با شیوه «جریان سیال ذهن» و بازی بی‌پایان با زبان، در «اولیس» یک روز از زندگی دوبلین را به حماسه‌ای بدل کرد."

- name: جینت وال
  country: آمریکا
  born: "۱۹۶۰"
  works: "قصر شیشه‌ای، اسب‌های وحشی"
  bio: "روزنامه‌نگار و نویسنده آمریکایی که با خاطره‌نوشت «قصر شیشه‌ای»، روایت کودکی پرآشوب و فقرزده‌اش، به شهرت رسید."

- name: خوان رولفو
  country: مکزیک
  born: "۱۹۱۷"
  died: "۱۹۸۶"
  works: "پدرو پارامو، دشت سوزان"
  bio: "نویسنده مکزیکی که تنها با یک رمان و یک مجموعه داستان، ادبیات آمریکای لاتین را دگرگون کرد. «پدرو پارامو»، روایتی خیال‌انگیز از دهکده‌ای پر از ارواح، الهام‌بخش گارسیا مارکز و رئالیسم جادویی بود."

- name: خورخه لوئیس بورخس
  country: آرژانتین
  born: "۱۸۹۹"
  died: "۱۹۸۶"
  works: "هزارتوها، الف، تخیلات (داستان‌ها)"
  bio: "شاعر و داستان‌نویس آرژانتینی و یکی از تأثیرگذارترین نویسندگان قرن بیستم. بورخس در داستان‌های کوتاه فلسفی‌اش با مفاهیم بی‌نهایت، آینه، هزارتو و کتابخانه بی‌پایان بازی می‌کند."

- name: خولیو کورتاسار
  country: آرژانتین
  born: "۱۹۱۴"
  died: "۱۹۸۴"
  works: "لی‌لی‌بازی، بازی‌ها، منزل تسخیرشده"
  bio: "نویسنده آرژانتینی و از چهره‌های «شکوفایی» ادبیات آمریکای لاتین. رمان «لی‌لی‌بازی» او را که می‌توان به ترتیب‌های گوناگون خواند، یکی از جسورانه‌ترین آزمون‌های فرم در رمان مدرن می‌دانند."

- name: دانا تارت
  country: آمریکا
  born: "۱۹۶۳"
  works: "تاریخ سری، سهره طلایی، دوست کوچک"
  bio: "رمان‌نویس آمریکایی که هر رمانش را با فاصله حدوداً ده‌ساله و با وسواس فراوان می‌نویسد. «سهره طلایی» او در ۲۰۱۴ جایزه پولیتزر را برد."

- name: داگلاس آدامز
  country: انگلیس
  born: "۱۹۵۲"
  died: "۲۰۰۱"
  works: "راهنمای کهکشان برای اتواستاپ‌زن‌ها، آژانس کارآگاهی کل‌نگر دیرک جنتلی"
  bio: "نویسنده انگلیسی و خالق مجموعه طنز علمی‌–تخیلیِ «راهنمای کهکشان». شوخ‌طبعی پوچ‌گرا و نگاه فلسفی او به جهان، عدد ۴۲ را به پاسخ مشهور «پرسش غایی» بدل کرد."

- name: دنی دیدرو
  country: فرانسه
  born: "۱۷۱۳"
  died: "۱۷۸۴"
  works: "ژاک قضاوقدری و اربابش، راهبه، برادرزاده رامو"
  bio: "فیلسوف و نویسنده فرانسوی عصر روشنگری و سرویراستار «دایرةالمعارف». رمان‌های نوآورانه و بازیگوش او، به‌ویژه «ژاک قضاوقدری»، قرن‌ها از زمانه خود جلوتر بودند."

- name: دی. اچ. لارنس
  country: انگلیس
  born: "۱۸۸۵"
  died: "۱۹۳۰"
  works: "عاشق لیدی چترلی، پسران و عشاق، رنگین‌کمان"
  bio: "رمان‌نویس و شاعر انگلیسی که با صراحتش درباره میل جنسی، عشق و رابطه انسان و طبیعت جنجال‌برانگیز بود. «عاشق لیدی چترلی» او سال‌ها در بریتانیا ممنوع ماند."

- name: دینو بوتزاتی
  country: ایتالیا
  born: "۱۹۰۶"
  died: "۱۹۷۲"
  works: "صحرای تاتارها، شصت داستان، کولومبره"
  bio: "روزنامه‌نگار و نویسنده ایتالیایی که او را «کافکای ایتالیا» می‌خوانند. «صحرای تاتارها»ی او تمثیلی است از عمری که در انتظار رویدادی بزرگ و هرگزنیامده هدر می‌رود."

- name: دیوید سداریس
  country: آمریکا
  born: "۱۹۵۶"
  works: "بگذار روزی برف ببارد، عریان، بیایید با دیابت گفت‌وگو کنیم"
  bio: "نویسنده و طنزپرداز آمریکایی که با جستارهای خودزندگی‌نامه‌ایِ بامزه‌اش شناخته می‌شود. سداریس زندگی خانوادگی، سفر و عجایب روزمره را با خودانتقادی و طنزی گزنده روایت می‌کند."

- name: ربکا اف کوانگ
  country: آمریکا
  born: "۱۹۹۶"
  works: "بابل، یلوفیس، جنگ خشخاش"
  bio: "نویسنده آمریکاییِ چینی‌تبار و از ستاره‌های نسل تازه ادبیات. کوانگ در آثارش استعمار، نژاد، زبان و صنعت نشر را با آمیزه‌ای از فانتزی، تاریخ و طنز تند نقد می‌کند."

- name: ری بردبری
  country: آمریکا
  born: "۱۹۲۰"
  died: "۲۰۱۲"
  works: "فارنهایت ۴۵۱، تواریخ مریخی، شراب قاصدک"
  bio: "نویسنده آمریکایی که مرز میان علمی‌–تخیلی، فانتزی و شعر را برداشت. «فارنهایت ۴۵۱»، تصویری از جامعه‌ای که کتاب‌ها را می‌سوزاند، به یکی از مشهورترین هشدارهای ادبی قرن بیستم بدل شد."

- name: ریموند چندلر
  country: آمریکا
  born: "۱۸۸۸"
  died: "۱۹۵۹"
  works: "خواب بزرگ، بدرود ای دلبر، خواهر کوچک"
  bio: "نویسنده آمریکایی و استاد ادبیات جناییِ «نوآر». کارآگاه خصوصیِ او، فیلیپ مارلو، با لحن کنایه‌آمیز و آرمان‌گرایی پنهانش، الگوی کارآگاهان داستانی بعد از خود شد."

- name: ریموند کارور
  country: آمریکا
  born: "۱۹۳۸"
  died: "۱۹۸۸"
  works: "وقتی از عشق حرف می‌زنیم از چه حرف می‌زنیم، کلیسای جامع، مبتدی‌ها"
  bio: "داستان‌کوتاه‌نویس و شاعر آمریکایی و چهره شاخص «مینیمالیسم». کارور زندگی فرودستان و طبقه کارگر آمریکا را با نثری عریان و لحظه‌هایی ناتمام و مبهم تصویر می‌کرد."

- name: زویا پیرزاد
  country: ایران
  born: "۱۹۵۲"
  works: "چراغ‌ها را من خاموش می‌کنم، عادت می‌کنیم، طعم گس خرمالو"
  bio: "نویسنده ایرانیِ ارمنی‌تبار که با «چراغ‌ها را من خاموش می‌کنم» جوایز متعدد برد. پیرزاد زندگی روزمره و دنیای درونی زنان طبقه متوسط ایران را با ظرافت و سادگی روایت می‌کند."

- name: سالی رونی
  country: ایرلند
  born: "۱۹۹۱"
  works: "آدم‌های معمولی، گفت‌وگو با دوستان، جهان زیبا، کجایی"
  bio: "نویسنده ایرلندی و از پرسروصداترین صداهای نسل هزاره. رونی روابط عاطفی، طبقه و سیاست را در میان جوانان امروز با گفت‌وگوهای دقیق و لحنی سرد بررسی می‌کند."

- name: سامرست موام
  country: انگلیس
  born: "۱۸۷۴"
  died: "۱۹۶۵"
  works: "لبه تیغ، پایبندی‌های انسانی، ماه و شش پنی"
  bio: "نویسنده انگلیسی و یکی از پرخواننده‌ترین داستان‌نویسان نیمه اول قرن بیستم. موام با نثری روشن و شخصیت‌پردازی تیزبینانه، جست‌وجوی معنا، هنر و آزادی فردی را روایت می‌کرد."

- name: شارلوت پرکینز گیلمن
  country: آمریکا
  born: "۱۸۶۰"
  died: "۱۹۳۵"
  works: "کاغذدیواری زرد، سرزمین زنان (هرلند)"
  bio: "نویسنده و نظریه‌پرداز فمینیست آمریکایی. داستان کوتاه «کاغذدیواری زرد» او، روایتی از فروپاشی روانی یک زن زیر فشار پزشکی و اجتماعی، از متون کلاسیک ادبیات فمینیستی است."

- name: شهان کاروناتیلاکا
  country: سریلانکا
  born: "۱۹۷۵"
  works: "هفت‌ماه مرگِ مالی آلمیدا، چینامن"
  bio: "نویسنده اهل سریلانکا و برنده بوکر ۲۰۲۲. «هفت‌ماه مرگِ مالی آلمیدا»، روایتی خیال‌انگیز و طنزآمیز از پسِ مرگ در دل جنگ داخلی سریلانکا، او را به شهرت جهانی رساند."

- name: صادق چوبک
  country: ایران
  born: "۱۹۱۶"
  died: "۱۹۹۸"
  works: "سنگ صبور، تنگسیر، خیمه‌شب‌بازی"
  bio: "نویسنده ایرانی و از پیشگامان داستان‌نویسی نوین فارسی. چوبک با نثری بی‌پروا و رئالیستی، زندگی فرودستان جنوب ایران و تاریک‌ترین زوایای جامعه را به ادبیات آورد."

- name: فردریش نیچه
  country: آلمان
  born: "۱۸۴۴"
  died: "۱۹۰۰"
  works: "چنین گفت زرتشت، فراسوی نیک و بد، تبارشناسی اخلاق"
  bio: "فیلسوف آلمانی و یکی از تأثیرگذارترین اندیشمندان مدرن. نیچه با مفاهیمی چون «مرگ خدا»، «ابرانسان» و «خواست قدرت»، بنیان‌های اخلاق و متافیزیک غربی را به چالش کشید."

- name: فریدریش دورنمات
  country: سوئیس
  born: "۱۹۲۱"
  died: "۱۹۹۰"
  works: "ملاقات بانوی سالخورده، قاضی و جلادش، فیزیک‌دان‌ها"
  bio: "نمایشنامه‌نویس و نویسنده سوئیسی که با تراژدی‌–کمدی‌های تلخش شناخته می‌شود. دورنمات در آثارش عدالت، گناه و فساد را در قالب موقعیت‌هایی گروتسک و طنزآمیز می‌کاود."

- name: فیودور داستایفسکی
  country: روسیه
  born: "۱۸۲۱"
  died: "۱۸۸۱"
  works: "جنایت و مکافات، برادران کارامازوف، ابله، یادداشت‌های زیرزمینی"
  bio: "نویسنده روس و یکی از ژرف‌ترین روان‌کاوان ادبیات جهان. داستایفسکی در رمان‌هایش با ایمان و الحاد، گناه و رستگاری و مرزهای آزادی انسان دست‌وپنجه نرم می‌کند."

- name: لئو تولستوی
  country: روسیه
  born: "۱۸۲۸"
  died: "۱۹۱۰"
  works: "جنگ و صلح، آنا کارنینا، مرگ ایوان ایلیچ"
  bio: "نویسنده روس و یکی از بزرگ‌ترین رمان‌نویسان تاریخ. تولستوی در آثار سترگش پهنه کامل جامعه روسیه را ترسیم کرد و در سال‌های پایانی به اخلاق‌گرایی دینی و ساده‌زیستی روی آورد."

- name: لوییس فردینان سلین
  country: فرانسه
  born: "۱۸۹۴"
  died: "۱۹۶۱"
  works: "سفر به انتهای شب، مرگ قسطی"
  bio: "پزشک و نویسنده فرانسوی که با «سفر به انتهای شب» و زبان شکسته و خشمگین کوچه‌و‌بازارش، نثر داستانی فرانسه را متحول کرد. آثارش درخشان اما شخصیتش به‌سبب یهودستیزی جنجالی است."

- name: مارتین مک‌دونا
  country: ایرلند
  born: "۱۹۷۰"
  works: "مرد بالشی، ملکه زیبایی لی‌نین، آدمکش ناشنوا"
  bio: "نمایشنامه‌نویس و فیلم‌ساز بریتانیایی–ایرلندی. مک‌دونا با آمیزه‌ای از خشونت، طنز سیاه و گفت‌وگوهای تند، در نمایشنامه‌هایی چون «مرد بالشی» مرز میان وحشت و کمدی را برمی‌دارد."

- name: مارک هادون
  country: انگلیس
  born: "۱۹۶۲"
  works: "ماجرای عجیب سگی در شب، نقطه‌چین قرمز"
  bio: "نویسنده و تصویرگر انگلیسی که با «ماجرای عجیب سگی در شب»، روایتی از زبان نوجوانی با ذهن متفاوت، به شهرت جهانی رسید."

- name: ماریو بارگاس یوسا
  country: پرو
  born: "۱۹۳۶"
  died: "۲۰۲۵"
  works: "گفت‌وگو در کاتدرال، سال‌های سگی، جنگ آخرزمان"
  bio: "نویسنده پرویی و برنده نوبل ۲۰۱۰ و از چهره‌های اصلی «شکوفایی» ادبیات آمریکای لاتین. یوسا قدرت، دیکتاتوری و فساد را با ساختارهای روایی پیچیده و جسورانه به تصویر کشید."

- name: مت هیگ
  country: انگلیس
  born: "۱۹۷۵"
  works: "کتابخانه نیمه‌شب، دلایلی برای زنده‌ماندن، چطور زمان را متوقف کنیم"
  bio: "نویسنده انگلیسی که درباره افسردگی، اضطراب و معنای زندگی هم داستان و هم ناداستان می‌نویسد. «کتابخانه نیمه‌شب» او به پدیده‌ای جهانی بدل شد."

- name: محمدعلی جمالزاده
  country: ایران
  born: "۱۸۹۲"
  died: "۱۹۹۷"
  works: "یکی بود یکی نبود، سروته یک کرباس، دارالمجانین"
  bio: "نویسنده ایرانی و پدر داستان کوتاه نوین فارسی. مجموعه «یکی بود یکی نبود» او نقطه آغاز نثر داستانی ساده، طنزآمیز و نزدیک به زبان مردم در ادبیات معاصر ایران است."

- name: مری شلی
  country: انگلیس
  born: "۱۷۹۷"
  died: "۱۸۵۱"
  works: "فرانکنشتاین، آخرین انسان"
  bio: "نویسنده انگلیسی که در نوجوانی «فرانکنشتاین» را نوشت و عملاً ژانر علمی‌–تخیلی را بنیان نهاد. داستان دانشمندی که موجودی می‌آفریند و رهایش می‌کند، تمثیلی ماندگار از مسئولیت و طرد است."

- name: مصطفی مستور
  country: ایران
  born: "۱۹۶۴"
  works: "استخوان خوک و دست‌های جذامی، روی ماه خداوند را ببوس، من گنجشک نیستم"
  bio: "نویسنده ایرانی که در آثارش پرسش‌های دینی، فلسفی و عاشقانه را در دل زندگی شهری امروز می‌گذارد. نثر ساده و درون‌مایه‌های معناجویانه، آثارش را میان مخاطبان جوان محبوب کرده است."

- name: مونا اواد
  country: کانادا
  born: "۱۹۷۸"
  works: "بانی، دختری چاق‌تر از همه که می‌شناسی، همه‌چیز اینجا زیباست"
  bio: "نویسنده کانادایی–مصری که آثارش آمیزه‌ای از طنز سیاه، وحشت و سوررئالیسم‌اند. رمان «بانی» هجوی گزنده بر محافل نخبه‌گرای نویسندگی و فشار زنانگی است."

- name: میتو سانیال
  country: آلمان
  born: "۱۹۷۱"
  works: "آیدنتیتی، واژن"
  bio: "نویسنده، روزنامه‌نگار و پژوهشگر فرهنگی آلمانیِ هندی‌تبار. رمان «آیدنتیتی» او با طنز و هوشمندی به مسئله هویت نژادی و سیاست هویت در آلمان امروز می‌پردازد."

- name: میخائیل بولگاکف
  country: روسیه
  born: "۱۸۹۱"
  died: "۱۹۴۰"
  works: "مرشد و مارگاریتا، دل سگ، تخم‌مرغ‌های شوم"
  bio: "پزشک و نویسنده روس که بیشتر آثارش در زمان حیاتش زیر سانسور شوروی ماند. شاهکار او «مرشد و مارگاریتا»، آمیزه‌ای از هجو سیاسی، فانتزی و عرفان، دهه‌ها پس از مرگش منتشر شد."

- name: میلنا آگوس
  country: ایتالیا
  born: "۱۹۵۹"
  works: "درد سنگ، در حالی که کوسه می‌خوابد"
  bio: "نویسنده ایتالیاییِ اهل ساردنیا که با رمان کوتاه «درد سنگ» شهرت یافت؛ روایتی شاعرانه از عشق، شور و رازهای پنهانِ یک خانواده ساردنیایی."

- name: ناتانیل هاثورن
  country: آمریکا
  born: "۱۸۰۴"
  died: "۱۸۶۴"
  works: "داغ ننگ، خانه هفت شیروانی"
  bio: "نویسنده آمریکایی و از بنیان‌گذاران ادبیات داستانی این کشور. هاثورن در «داغ ننگ» گناه، شرم و ریاکاری اخلاقی جامعه پیوریتنِ نیوانگلند را با نمادپردازی تیره کاوید."

- name: نجیب محفوظ
  country: مصر
  born: "۱۹۱۱"
  died: "۲۰۰۶"
  works: "سه‌گانه قاهره، کوچه مدق، بچه‌های محله ما"
  bio: "نویسنده مصری و نخستین نویسنده عرب‌زبانی که نوبل ادبیات گرفت (۱۹۸۸). محفوظ در آثارش زندگی محله‌های قاهره و دگرگونی جامعه مصر را در گذار از سنت به مدرنیته روایت کرد."

- name: نسیم مرعشی
  country: ایران
  born: "۱۹۸۴"
  works: "پاییز فصل آخر سال است، هرس"
  bio: "نویسنده و روزنامه‌نگار ایرانی که با «پاییز فصل آخر سال است» جایزه جلال آل‌احمد را برد. مرعشی دغدغه‌ها، تردیدها و آرزوهای زنان جوان ایرانی امروز را روایت می‌کند."

- name: نظامی
  country: ایران
  born: "حدود ۱۱۴۱"
  died: "۱۲۰۹"
  works: "خمسه: خسرو و شیرین، لیلی و مجنون، هفت پیکر، اسکندرنامه، مخزن‌الاسرار"
  bio: "شاعر بزرگ پارسی‌گو و استاد بی‌بدیل منظومه‌های عاشقانه. نظامی گنجوی با «خمسه» (پنج گنج)، داستان‌سرایی غنایی فارسی را به اوج رساند و الگوی شاعران پس از خود شد."

- name: نیکولای گوگول
  country: روسیه
  born: "۱۸۰۹"
  died: "۱۸۵۲"
  works: "نفوس مرده، شنل، بازرس"
  bio: "نویسنده روس (زاده اوکراین) و از پدران رئالیسم و طنز روسی. داستایفسکی می‌گفت همه نویسندگان روس «از زیر شنلِ گوگول» بیرون آمده‌اند؛ اشاره‌ای به داستان مشهور «شنل»."

- name: هاروکی موراکامی
  country: ژاپن
  born: "۱۹۴۹"
  works: "کافکا در کرانه، جنگل نروژی، سرگذشت پرنده کوکی، ۱کیو۸۴"
  bio: "نویسنده ژاپنی و یکی از پرخواننده‌ترین نویسندگان زنده جهان. موراکامی واقعیت روزمره را با عناصر سوررئال، تنهایی، موسیقی و فرهنگ پاپ غرب در هم می‌آمیزد و جهانی خاص خود می‌سازد."

- name: هان کانگ
  country: کره
  born: "۱۹۷۰"
  works: "گیاهخوار، اعمال انسانی، کتاب سفید"
  bio: "نویسنده کره‌ای و برنده نوبل ۲۰۲۴. هان کانگ با نثری شاعرانه و تصویری، خشونت، تروما و تن انسان را می‌کاود؛ «گیاهخوار» او را به شهرت جهانی رساند."

- name: هاینریش بل
  country: آلمان
  born: "۱۹۱۷"
  died: "۱۹۸۵"
  works: "عقاید یک دلقک، آبروی ازدست‌رفته کاترینا بلوم، بیلیارد در ساعت نه‌ونیم"
  bio: "نویسنده آلمانی و برنده نوبل ۱۹۷۲ و وجدان اخلاقی آلمانِ پس از جنگ. بل ریاکاری، جنگ و فشار نهادها بر فرد را با نگاهی انسانی و انتقادی روایت می‌کرد."

- name: هرمان هسه
  country: آلمان
  born: "۱۸۷۷"
  died: "۱۹۶۲"
  works: "سیذارتا، دمیان، گرگ بیابان، بازی مهره‌های شیشه‌ای"
  bio: "نویسنده آلمانی–سوئیسی و برنده نوبل ۱۹۴۶. هسه در آثارش جست‌وجوی معنویت، خودشناسی و گذار از بحران درونی را روایت می‌کند؛ درون‌مایه‌هایی که او را محبوب نسل‌های جوان کرد."

- name: هنری فیدلینگ
  country: انگلیس
  born: "۱۷۰۷"
  died: "۱۷۵۴"
  works: "تام جونز، جوزف اندروز"
  bio: "نمایشنامه‌نویس و رمان‌نویس انگلیسی و یکی از بنیان‌گذاران رمان انگلیسی. «تام جونز» او با طنز سرزنده و راویِ پرحرف و بازیگوشش، یکی از نخستین رمان‌های بزرگ کمیک است."

- name: ویرجینیا وولف
  country: انگلیس
  born: "۱۸۸۲"
  died: "۱۹۴۱"
  works: "خانم دالوی، به سوی فانوس دریایی، اتاقی از آن خود"
  bio: "نویسنده انگلیسی و از چهره‌های محوری مدرنیسم و حلقه بلومزبری. وولف با شیوه «جریان سیال ذهن» زمان و آگاهی را بازآفرید و در «اتاقی از آن خود» از استقلال زن نویسنده دفاع کرد."

- name: ویلیام فاکنر
  country: آمریکا
  born: "۱۸۹۷"
  died: "۱۹۶۲"
  works: "خشم و هیاهو، گور به گور، آبشالوم، آبشالوم!"
  bio: "نویسنده آمریکایی و برنده نوبل ۱۹۴۹. فاکنر در شهرستان خیالی یوکناپاتوفا، با روایت‌های چندصدایی و جریان سیال ذهن، فروپاشی جنوب آمریکا را به حماسه‌ای مدرن بدل کرد."

- name: ویکتور هوگو
  country: فرانسه
  born: "۱۸۰۲"
  died: "۱۸۸۵"
  works: "بینوایان، گوژپشت نوتردام، آخرین روز یک محکوم"
  bio: "شاعر و نویسنده فرانسوی و بزرگ‌ترین چهره رمانتیسم این کشور. هوگو در «بینوایان» عدالت، فقر و رستگاری را در پهنه‌ای عظیم روایت کرد و قهرمان ادبی و سیاسیِ مردم فرانسه شد."

- name: پائولو کوئلیو
  country: برزیل
  born: "۱۹۴۷"
  works: "کیمیاگر، ورونیکا تصمیم می‌گیرد بمیرد، کنار رود پیدرا نشستم و گریستم"
  bio: "نویسنده برزیلی و یکی از پرفروش‌ترین نویسندگان جهان. کوئلیو در «کیمیاگر» با زبانی ساده و تمثیلی، از دنبال‌کردن رؤیاها و «افسانه شخصی» هر انسان سخن می‌گوید."

- name: پل استر
  country: آمریکا
  born: "۱۹۴۷"
  died: "۲۰۲۴"
  works: "سه‌گانه نیویورک، کتاب اوهام، ۴ ۳ ۲ ۱"
  bio: "نویسنده آمریکایی و استاد روایت‌های پست‌مدرن درباره تصادف، هویت و سرنوشت. «سه‌گانه نیویورک» او قالب داستان کارآگاهی را به تأملی فلسفی درباره زبان و خود بدل می‌کند."

- name: پونه مقیمی
  country: ایران
  works: "تکه‌هایی از یک کلِ منسجم"
  bio: "نویسنده ایرانی در حوزه روان‌شناسی و خودیاری که آثارش به رشد فردی و شناخت احساسات می‌پردازد."

- name: پیتر اشتام
  country: سوئیس
  born: "۱۹۶۳"
  works: "آگنس، روزی مثل امروز، تمام چیزهایی که جایشان خالی است"
  bio: "نویسنده سوئیسی آلمانی‌زبان که با نثری ساده، سرد و دقیق، تنهایی و بیگانگی انسان مدرن را روایت می‌کند. آثار موجزش بارها نامزد جوایز بین‌المللی شده‌اند."

- name: پیتر بیکسل
  country: سوئیس
  born: "۱۹۳۵"
  died: "۲۰۲۵"
  works: "آمریکا وجود ندارد، داستان‌های کودکان"
  bio: "نویسنده و روزنامه‌نگار سوئیسی که با داستان‌های کوتاه و به‌ظاهر ساده‌اش شناخته می‌شود. بیکسل در نثر مینیمال خود تنهایی، زبان و مرز میان واقعیت و خیال را می‌کاود."

- name: چارلز بوکوفسکی
  country: آمریکا
  born: "۱۹۲۰"
  died: "۱۹۹۴"
  works: "عامه‌پسند، زنان، ساندویچ ژامبون، هزارپیشه"
  bio: "شاعر و نویسنده آمریکاییِ آلمانی‌تبار و چهره شاخص «ادبیات کثیف». بوکوفسکی با زبانی خام و بی‌پرده، زندگی فرودستان، الکل، فقر و حاشیه‌نشینی لس‌آنجلس را روایت کرد."

- name: چیماماندا انگزی آدیچی
  country: نیجریه
  born: "۱۹۷۷"
  works: "نیمی از خورشید زرد، آمریکانا، همه باید فمینیست باشیم"
  bio: "نویسنده نیجریه‌ای و از تأثیرگذارترین صداهای ادبیات معاصر آفریقا. آدیچی درباره استعمار، مهاجرت، نژاد و فمینیسم می‌نویسد و سخنرانی‌هایش شهرتی جهانی یافته‌اند."

- name: چیگوزی اوبیوما
  country: نیجریه
  born: "۱۹۸۶"
  works: "ماهیگیران، ارکستر اقلیت‌ها"
  bio: "نویسنده نیجریه‌ای که دو رمان نخستش هر دو به فهرست نهایی بوکر راه یافتند. اوبیوما اسطوره و باور سنتی ایگبو را با تراژدی یونانی در هم می‌آمیزد."

- name: کاترین وب
  country: انگلیس
  born: "۱۹۸۶"
  works: "پانزده زندگی نخستِ هری آگوست (با نام کلر نورث)"
  bio: "نویسنده انگلیسی که از نوجوانی آغاز به نوشتن کرد و با نام مستعار «کلر نورث» آثار علمی‌–تخیلیِ تحسین‌شده‌ای نوشت؛ از جمله «پانزده زندگی نخستِ هری آگوست»."

- name: کارولین دِ روبرتیس
  country: آمریکا
  born: "۱۹۷۵"
  works: "کوهستان نامرئی، خدا را به نام‌های گوناگون می‌خوانند (کانتوراس)"
  bio: "نویسنده آمریکاییِ اروگوئه‌ای‌تبار که درباره هویت، تبعید و زندگی زنان و اقلیت‌های جنسی در آمریکای لاتین می‌نویسد."

- name: کارلوس لوییس زافون
  country: اسپانیا
  born: "۱۹۶۴"
  died: "۲۰۲۰"
  works: "سایه باد، بازی فرشته، زندانی آسمان، هزارتوی ارواح"
  bio: "نویسنده اسپانیایی اهل بارسلونا که با مجموعه «گورستان کتاب‌های فراموش‌شده» شهرت جهانی یافت. زافون فضای گوتیک، راز و عشق به کتاب را در بارسلونای پس از جنگ داخلی در هم می‌آمیزد."

- name: کازوئو ایشیگورو
  country: انگلیس
  born: "۱۹۵۴"
  works: "بازمانده روز، هرگز رهایم مکن، کلارا و خورشید"
  bio: "نویسنده انگلیسیِ ژاپنی‌تبار و برنده نوبل ۲۰۱۷. ایشیگورو با راویان فریب‌خورده و نثری مهارشده، حافظه، پشیمانی و خودفریبی را در آثاری آرام اما عمیقاً اندوهبار می‌کاود."

- name: کرت وانه‌گت
  country: آمریکا
  born: "۱۹۲۲"
  died: "۲۰۰۷"
  works: "سلاخ‌خانه شماره پنج، گهواره گربه، صبحانه قهرمانان"
  bio: "نویسنده آمریکایی که علمی‌–تخیلی، طنز سیاه و هجو اجتماعی را در هم آمیخت. تجربه او از بمباران درسدن در جنگ جهانی دوم، جان‌مایه شاهکارش «سلاخ‌خانه شماره پنج» است."

- name: کورت ونه‌گات
  country: آمریکا
  born: "۱۹۲۲"
  died: "۲۰۰۷"
  works: "سلاخ‌خانه شماره پنج، گهواره گربه، صبحانه قهرمانان"
  bio: "نویسنده آمریکایی که علمی‌–تخیلی، طنز سیاه و هجو اجتماعی را در هم آمیخت. تجربه او از بمباران درسدن در جنگ جهانی دوم، جان‌مایه شاهکارش «سلاخ‌خانه شماره پنج» است. (املای دیگرِ همان نام «کرت وانه‌گت».)"

- name: کوکو ملورز
  country: انگلیس
  works: "کلئوپاترا و فرانکنشتاین، خواهران بلو"
  bio: "نویسنده انگلیسی–آمریکایی که با نخستین رمانش «کلئوپاترا و فرانکنشتاین»، روایتی از عشق، اعتیاد و جوانی در نیویورک، به شهرت رسید."

- name: کیگو هیگاشینو
  country: ژاپن
  born: "۱۹۵۸"
  works: "ارادت کامل فرد مظنون، خیانت (سوءنیت)، رستگاری یک قدیس"
  bio: "نویسنده ژاپنی و یکی از پرفروش‌ترین نویسندگان جنایی آسیا. هیگاشینو با معماهای هوشمندانه و چرخش‌های روان‌شناختی، ساختار داستان کارآگاهی را به شکلی تازه بازآفرینی می‌کند."

- name: گابریل گارسیا مارکز
  country: کلمبیا
  born: "۱۹۲۷"
  died: "۲۰۱۴"
  works: "صد سال تنهایی، عشق در روزگار وبا، پاییز پدرسالار"
  bio: "نویسنده کلمبیایی و برنده نوبل ۱۹۸۲ و چهره نمادین رئالیسم جادویی. «صد سال تنهایی» او، تاریخ خیالی خاندان بوئندیا در دهکده ماکوندو، از مهم‌ترین رمان‌های قرن بیستم است."

- name: گراهام گرین
  country: انگلیس
  born: "۱۹۰۴"
  died: "۱۹۹۱"
  works: "قدرت و جلال، پایان یک رابطه، مرد سوم، آمریکایی آرام"
  bio: "نویسنده انگلیسی که میان رمان‌های جدیِ اخلاقی–دینی و آثار پرکششِ جنایی حرکت می‌کرد. گرین در «سرزمین‌های گرین» تنش میان ایمان، گناه و سیاست را در نقاط بحرانی جهان می‌کاوید."

- name: گوستاو فلوبر
  country: فرانسه
  born: "۱۸۲۱"
  died: "۱۸۸۰"
  works: "مادام بواری، تربیت احساسات، سالامبو"
  bio: "نویسنده فرانسوی و استاد بی‌چون‌و‌چرای رئالیسم. فلوبر با وسواس کم‌نظیر در جست‌وجوی «واژه دقیق»، «مادام بواری» را آفرید؛ پرتره‌ای بی‌رحم از رؤیاپردازی و سرخوردگی."

- name: یوناس یوناسون
  country: سوئد
  born: "۱۹۶۱"
  works: "مرد صدساله‌ای که از پنجره فرار کرد و ناپدید شد، دختری که پادشاه سوئد را نجات داد"
  bio: "روزنامه‌نگار و نویسنده سوئدی که با نخستین رمانش، کمدیِ پرفروش «مرد صدساله‌ای که از پنجره فرار کرد...»، به شهرت جهانی رسید؛ هجوی شاد بر تاریخ پرآشوب قرن بیستم."
